name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/myapp-backend

jobs:
  # ─────────────────────────────────────
  # JOB 1: Test
  # ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run tests
        working-directory: ./backend
        run: |
          # test script байхгүй бол skip
          npm test --if-present || echo "No tests found, skipping"

      - name: Check syntax
        working-directory: ./backend
        run: node --check server.js && echo "Syntax OK"

  # ─────────────────────────────────────
  # JOB 2: Build & Push Docker Image
  # ─────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Hub-д нэвтрэх
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata тохируулах
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=v1.0.{{run_number}}

      - name: Multi-platform builder тохируулах
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (multi-stage)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Build cache — дараагийн build хурдасна
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest харуулах
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"

  # ─────────────────────────────────────
  # JOB 3: Summary
  # ─────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: always()

    steps:
      - name: Pipeline дүн
        run: |
          echo "## CI/CD Pipeline Дүн" >> $GITHUB_STEP_SUMMARY
          echo "| Үе шат | Төлөв |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
